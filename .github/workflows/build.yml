name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame numpy soundfile pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon pngegg_1.ico --name "MusicVisualizer" visualization.py processing.py files.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: MusicVisualizer-Windows
        path: dist/MusicVisualizer.exe